<style>
*{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#faf8f5;color:#1c1917}
.font-display{font-family:'DM Serif Display',Georgia,serif}
.sidebar-link{transition:all .15s ease;border-left:3px solid transparent}

<body>

<!-- ═══ AUTH MODAL ═══ -->
<div id="auth-modal" class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl p-8 md:p-10 max-w-md w-full shadow-2xl">

        <svg id="auth-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
      </button>

</div>

      <button onclick="lock()" class="text-earth-400 hover:text-earth-600 transition-colors" title="Lock dashboard">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </button>
    </div>

        Overview

        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        Shops
      </a>
      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="products">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Products

      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="orders">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        Orders

      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="tables">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Tables
      </a>
      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="kitchen">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
        Kitchen
      </a>
      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="wallet">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        Wallet
      </a>
      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="appointments">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Appointments
      </a>
      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="bookings">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Bookings
      </a>
      <a href="#" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-r-lg text-sm text-earth-700" data-tab="send">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
        Send Message

    </nav>
    <div class="p-4 border-t border-earth-100 text-xs text-earth-400 text-center">&copy; 2026 Wapply</div>
  </aside>

  <!-- Mobile menu toggle (visible on small screens) -->
  <button id="mobile-toggle" onclick="toggleMobileSidebar()" class="hidden fixed top-4 left-4 z-30 bg-white border border-earth-200 rounded-xl p-2 shadow-md">
    <svg class="w-5 h-5 text-earth-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <!-- Main content -->
  <main id="main-content" class="flex-1 overflow-y-auto p-6 md:p-8">
    <!-- Content rendered here by JS -->
    <div id="tab-content"></div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let apiKey = sessionStorage.getItem('weai_admin_key') || '';
let activeTab = 'overview';
let shopsCache = [];

// ══════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════
async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  if (apiKey) headers['X-API-Key'] = apiKey;
  if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(path, { ...options, headers });
  if (res.status === 401) {
    sessionStorage.removeItem('weai_admin_key');
    apiKey = '';
    showAuthModal();
    throw new Error('Unauthorized — please re-enter your API key');
  }
  if (!res.ok) {
    const text = await res.text().catch(() => 'Unknown error');
    throw new Error(`HTTP ${res.status}: ${text}`);
  }
  return res.json();
}

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
function showAuthModal(errMsg) {
  document.getElementById('auth-modal').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  const errEl = document.getElementById('auth-error');
  if (errMsg) {
    errEl.textContent = errMsg;
    errEl.classList.remove('hidden');
  } else {
    errEl.classList.add('hidden');
  }
}

function hideAuthModal() {
  document.getElementById('auth-modal').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

async function unlock() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  const btn = document.getElementById('auth-btn');
  const text = document.getElementById('auth-btn-text');
  const spin = document.getElementById('auth-spinner');
  btn.disabled = true; text.textContent = 'Verifying...'; spin.classList.remove('hidden');
  try {
    // Test key via health endpoint
    apiKey = key;
    await apiFetch('/api/health');
    sessionStorage.setItem('weai_admin_key', key);
    hideAuthModal();
    initDashboard();
  } catch (e) {
    apiKey = '';
    showAuthModal('Invalid API key. Please check and try again.');
  }
  btn.disabled = false; text.textContent = 'Unlock Dashboard'; spin.classList.add('hidden');
}

function lock() {
  sessionStorage.removeItem('weai_admin_key');
  apiKey = '';
  showAuthModal();
}

// ══════════════════════════════════════════════
// TOASTS
// ══════════════════════════════════════════════
function toast(msg, type = 'success') {
  const colors = {
    success: 'bg-brand-600 text-white',
    error: 'bg-red-600 text-white',
    info: 'bg-earth-700 text-white',
  };
  const el = document.createElement('div');
  el.className = `toast ${colors[type] || colors.info} px-4 py-3 rounded-xl text-sm font-medium shadow-lg max-w-sm`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

// ══════════════════════════════════════════════
// CONFIRM
// ══════════════════════════════════════════════
let confirmCallback = null;
function showConfirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.remove('hidden');
  confirmCallback = cb;
  document.getElementById('confirm-yes').onclick = () => { closeConfirm(); if (confirmCallback) confirmCallback(); };
}
function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }

// ══════════════════════════════════════════════
// MOBILE SIDEBAR
// ══════════════════════════════════════════════
function toggleMobileSidebar() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
}

// ══════════════════════════════════════════════
// TAB SYSTEM
// ══════════════════════════════════════════════
function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  document.querySelector(`.sidebar-link[data-tab="${tabId}"]`).classList.add('active');
  // Close mobile sidebar
  document.getElementById('sidebar').classList.add('-translate-x-full');
  renderTab(tabId);
}

document.querySelectorAll('.sidebar-link').forEach(el => {
  el.addEventListener('click', e => { e.preventDefault(); switchTab(el.dataset.tab); });
});

function renderTab(tabId) {
  const container = document.getElementById('tab-content');
  switch (tabId) {
    case 'overview': renderOverview(container); break;
    case 'shops': renderShops(container); break;
    case 'products': renderProducts(container); break;
    case 'orders': renderOrders(container); break;
    case 'tables': renderTables(container); break;
    case 'kitchen': renderKitchen(container); break;
    case 'wallet': renderWallet(container); break;
    case 'appointments': renderAppointments(container); break;
    case 'bookings': renderBookings(container); break;
    case 'send': renderSendMessage(container); break;
    default: container.innerHTML = '<div class="empty-state"><p>Select a tab</p></div>';
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function initDashboard() {
  document.getElementById('sidebar').classList.remove('-translate-x-full');
  switchTab('overview');
}

// On load: check for stored key
document.addEventListener('DOMContentLoaded', () => {
  if (apiKey) {
    hideAuthModal();
    initDashboard();
  }
  // Enter key on auth input
  document.getElementById('api-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
});

// ────────────────────────────────────────────────────────────────────────────
// TAB RENDERERS
// ────────────────────────────────────────────────────────────────────────────

// ══════════════════════════════════════════════
// SHOPS helper
// ══════════════════════════════════════════════
async function loadShops() {
  shopsCache = await apiFetch('/api/shops');
  return shopsCache;
}

// ══════════════════════════════════════════════
// OVERVIEW TAB
// ══════════════════════════════════════════════
async function renderOverview(container) {
  container.innerHTML = `<div class="flex items-center justify-center py-20"><div class="spinner"></div></div>`;
  try {
    const health = await apiFetch('/api/health').catch(() => null);
    const shops = await loadShops().catch(() => []);
    const now = new Date().toISOString().split('T')[0];

    let totalOrders = 0, activeShops = 0;
    for (const shop of shops) {
      if (shop.active !== false) activeShops++;
      try {
        const orders = await apiFetch(`/api/shops/${shop.id}/orders`).catch(() => []);
        totalOrders += orders.filter(o => o.created_at && o.created_at.startsWith(now)).length;
      } catch {}
    }

    container.innerHTML = `
      <div class="mb-8">
        <h1 class="text-2xl font-display text-brand-900">Dashboard Overview</h1>
        <p class="text-earth-500 text-sm mt-1">${new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-2xl p-5 border border-earth-200">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-xl bg-brand-100 text-brand-600 flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg></div>
            <span class="text-xs font-semibold text-earth-500 uppercase tracking-wider">Total Shops</span>
          </div>
          <p class="text-3xl font-display text-brand-900">${shops.length}</p>
          <p class="text-xs text-earth-400 mt-1">${activeShops} active</p>
        </div>
        <div class="bg-white rounded-2xl p-5 border border-earth-200">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-xl bg-amber-100 text-amber-600 flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
            <span class="text-xs font-semibold text-earth-500 uppercase tracking-wider">Today's Orders</span>
          </div>
          <p class="text-3xl font-display text-brand-900">${totalOrders}</p>
        </div>
        <div class="bg-white rounded-2xl p-5 border border-earth-200">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-xl bg-green-100 text-green-600 flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
            <span class="text-xs font-semibold text-earth-500 uppercase tracking-wider">API Status</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="status-dot ${health ? 'active' : 'inactive'}"></span>
            <span class="text-sm font-medium ${health ? 'text-brand-700' : 'text-red-700'}">${health ? 'Connected' : 'Unreachable'}</span>
          </div>
          <p class="text-xs text-earth-400 mt-1">v${health?.version || '?'}</p>
        </div>
        <div class="bg-white rounded-2xl p-5 border border-earth-200">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-xl bg-purple-100 text-purple-600 flex items-center justify-center"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
            <span class="text-xs font-semibold text-earth-500 uppercase tracking-wider">Server</span>
          </div>
          <p class="text-sm font-medium text-brand-900">port 8000</p>
          <p class="text-xs text-earth-400 mt-1">FastAPI</p>
        </div>
      </div>

window.addProduct = async function(shopId) {

window.loadOrders = async function() {
  const shopId = document.getElementById('order-shop-select').value;
  const container = document.getElementById('orders-container');
  if (!shopId) { container.innerHTML = `<div class="empty-state"><p>Select a shop</p></div>`; return; }
  container.innerHTML = `<div class="flex items-center justify-center py-10"><div class="spinner"></div></div>`;
  try {
    const orders = await apiFetch(`/api/shops/${shopId}/orders`);
    const statusColors = { pending:'bg-amber-100 text-amber-700', accepted:'bg-blue-100 text-blue-700', preparing:'bg-orange-100 text-orange-700', ready:'bg-brand-100 text-brand-700', delivered:'bg-earth-100 text-earth-600', cancelled:'bg-red-100 text-red-600', completed:'bg-brand-100 text-brand-700' };
    container.innerHTML = `
      <h2 class="font-display text-base text-brand-900 mb-4">${orders.length} orders</h2>
      ${orders.length === 0 ? '<div class="empty-state py-8"><p>No orders yet</p></div>' :
      `<div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="bg-earth-50 text-earth-600 text-xs uppercase tracking-wider">
          <th class="text-left px-4 py-3 font-medium">Customer</th>
          <th class="text-left px-4 py-3 font-medium">Items</th>
          <th class="text-left px-4 py-3 font-medium">Total</th>
          <th class="text-left px-4 py-3 font-medium">Status</th>
          <th class="text-left px-4 py-3 font-medium">Date</th>
          <th class="text-left px-4 py-3 font-medium">Actions</th>
        </tr></thead>
        <tbody class="divide-y divide-earth-100">
          ${orders.map(o => {
            const items = Array.isArray(o.items) ? o.items : (typeof o.items === 'string' ? JSON.parse(o.items||'[]') : []);
            const total = o.total || items.reduce((sum,i) => sum + (i.price||0)*(i.quantity||1), 0);
            const sc = statusColors[o.status] || 'bg-earth-100 text-earth-600';
            return `<tr>
              <td class="px-4 py-3 font-medium text-brand-900">${esc(o.customer_name || o.wa_id || '—')}</td>
              <td class="px-4 py-3 text-earth-600">${items.length} item${items.length!==1?'s':''}</td>
              <td class="px-4 py-3 text-earth-600">₹${Number(total).toLocaleString('en-IN')}</td>
              <td class="px-4 py-3"><span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${sc}">${esc(o.status || 'pending')}</span></td>
              <td class="px-4 py-3 text-earth-400 text-xs">${o.created_at ? new Date(o.created_at).toLocaleDateString() : '—'}</td>
              <td class="px-4 py-3">
                <select onchange="updateOrderStatus('${o.id}',this)" class="text-xs bg-earth-50 border border-earth-200 rounded-lg px-2 py-1">

                  <option value="accepted">Accept</option>
                  <option value="preparing">Preparing</option>
                  <option value="ready">Ready</option>
                  <option value="delivered">Delivered</option>
                  <option value="cancelled">Cancel</option>
                </select>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`}`;
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><p>Failed: ${esc(e.message)}</p></div>`;
  }
};

window.updateOrderStatus = async function(orderId, select) {

  select.disabled = true;
  try {

    toast(`Order ${status}`);
    loadOrders();
  } catch (e) { toast(e.message, 'error'); select.disabled = false; }
};

window.addTable = async function(shopId) {
  const table_number = parseInt(document.getElementById('new-table-num').value);
  const table_name = document.getElementById('new-table-name').value.trim() || null;
  if (!table_number || table_number < 1) { toast('Valid table number required', 'error'); return; }
  try {
    await apiFetch(`/api/shops/${shopId}/tables`, {
      method: 'POST',
      body: JSON.stringify({ table_number, table_name }),
    });
    toast('Table added');
    loadTables();
  } catch (e) { toast(e.message, 'error'); }
};

window.genTableQRs = async function(shopId) {

window.loadKitchen = async function() {
  const shopId = document.getElementById('kitchen-shop-select').value;
  const container = document.getElementById('kitchen-container');
  if (!shopId) { container.innerHTML = `<div class="empty-state"><p>Select a shop</p></div>`; return; }
  container.innerHTML = `<div class="flex items-center justify-center py-10"><div class="spinner"></div></div>`;
  try {
    const orders = await apiFetch(`/api/shops/${shopId}/kitchen-orders`);
    const statusColors = { new:'bg-red-100 text-red-700', preparing:'bg-amber-100 text-amber-700', ready:'bg-brand-100 text-brand-700', served:'bg-earth-100 text-earth-500' };
    container.innerHTML = `
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-display text-base text-brand-900">${orders.length} active orders</h2>
        <button onclick="loadKitchen()" class="text-brand-600 text-sm font-semibold hover:text-brand-700 flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Refresh
        </button>
      </div>
      ${orders.length === 0 ? '<div class="empty-state py-8"><p>No active kitchen orders</p></div>' :
      `<div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="bg-earth-50 text-earth-600 text-xs uppercase tracking-wider">
          <th class="text-left px-4 py-3 font-medium">Order ID</th>
          <th class="text-left px-4 py-3 font-medium">Items</th>
          <th class="text-left px-4 py-3 font-medium">Table</th>
          <th class="text-left px-4 py-3 font-medium">Status</th>
          <th class="text-left px-4 py-3 font-medium">Actions</th>
        </tr></thead>
        <tbody class="divide-y divide-earth-100">
          ${orders.map(o => {
            const sc = statusColors[o.status] || 'bg-earth-100 text-earth-600';
            const items = Array.isArray(o.items) ? o.items : (typeof o.items === 'string' ? JSON.parse(o.items||'[]') : []);
            return `<tr>
              <td class="px-4 py-3 font-mono text-xs text-brand-900">${esc(o.id ? o.id.slice(0,8) : '—')}</td>
              <td class="px-4 py-3 text-earth-600">${items.map(i => esc(i.name||i.product_name||'?')).join(', ')}</td>
              <td class="px-4 py-3 text-earth-600">${esc(o.table_number || o.table_no || '—')}</td>
              <td class="px-4 py-3"><span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium ${sc}">${esc(o.status||'new')}</span></td>
              <td class="px-4 py-3">
                <div class="flex gap-1">
                  ${o.status === 'new' ? `<button onclick="updateKitchen('${o.id}','preparing')" class="bg-amber-500 text-white px-2.5 py-1 rounded-lg text-xs font-medium hover:bg-amber-600 transition-all">Prep</button>` : ''}
                  ${o.status === 'preparing' ? `<button onclick="updateKitchen('${o.id}','ready')" class="bg-brand-500 text-white px-2.5 py-1 rounded-lg text-xs font-medium hover:bg-brand-600 transition-all">Ready</button>` : ''}
                  ${o.status === 'ready' ? `<button onclick="updateKitchen('${o.id}','served')" class="bg-earth-500 text-white px-2.5 py-1 rounded-lg text-xs font-medium hover:bg-earth-600 transition-all">Served</button>` : ''}
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>`}`;
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><p>Failed: ${esc(e.message)}</p></div>`;
  }
};

window.updateKitchen = async function(orderId, status) {

  } catch (e) { toast(e.message, 'error'); }
};

    document.getElementById('send-text').value = '';
  } catch (e) { toast(e.message, 'error'); }
};

// ══════════════════════════════════════════════
// ESCAPING
// ══════════════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
